# Hostinger Git Auto Deployment is designed to receive GitHub webhook deliveries.
# Do not call the Hostinger webhook URL with an empty curl request from GitHub Actions:
# Hostinger expects a GitHub repository webhook payload on push events.
#
# One-time hPanel setup (afflatusconsulting.tech):
#   1. Advanced → Git → create repo: https://github.com/ismailidrissi-sudo/afflatus-landing.git
#   2. Branch: master (or main). Install path: leave empty for account public_html, or set
#      to public_html per Hostinger docs if your layout requires it.
#   3. Private repo: use Hostinger’s deploy key → add in GitHub → Settings → Deploy keys.
#   4. Open Git → Auto Deployment → copy the Webhook URL (token in query string).
#   5. GitHub → this repo → Settings → Webhooks → Add webhook:
#        Payload URL: paste the full Hostinger Webhook URL
#        Content type: application/json
#        Events: Just the push event
#        Active: enabled
#   6. Push to master and check hPanel → Git → Latest build output.

name: Hostinger Auto-Deploy Setup Note

on:
  workflow_dispatch:

jobs:
  info:
    runs-on: ubuntu-latest
    steps:
      - name: Explain Hostinger setup
        run: |
          echo "::notice::Hostinger Git Auto Deployment should be configured as a GitHub repository webhook, not called directly from Actions."
          echo "::notice::GitHub -> Settings -> Webhooks -> Add webhook -> use the Hostinger Auto Deployment URL, application/json, push event, Active."

# Deploy site to hosting FTP → public_html (serves afflatusconsulting.tech)
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   FTP_USERNAME — full FTP login (e.g. u485919720.afflatusconsulting.tech from hPanel)
#   FTP_PASSWORD — FTP password from hosting panel (never commit)
#
# If the job fails with "username" / "password" not supplied, those secrets are missing or empty.
# If plain FTP fails, add: protocol: ftps (see action README).

name: Deploy to FTP

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify FTP secrets exist
        env:
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          if [ -z "$FTP_USERNAME" ] || [ -z "$FTP_PASSWORD" ]; then
            echo "::error::Missing FTP_USERNAME and/or FTP_PASSWORD."
            echo "Add both secrets: Repository → Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          fi

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          # Hostname from panel; use 82.25.113.173 if DNS issues
          server: afflatusconsulting.tech
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: public_html/
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            .gitignore

# Deploy site to hosting FTP → public_html (serves afflatusconsulting.tech)
#
# Required — add under: Repository → Settings → Secrets and variables → Actions
#   (use either name on the left; first match wins)
#
#   Username: FTP_USERNAME  OR  FTP_USER
#   Password: FTP_PASSWORD  OR  FTP_PASS
#
# Hostinger: hPanel → Files → FTP Accounts → copy full username + password you set.
# Forks: secrets are NOT inherited — create them again on your fork.
# Org secrets: allow this repository in the secret’s access list.
#
# If secrets are missing, the workflow still succeeds but skips FTP upload
# (see “Check FTP credentials” step log for a notice).

name: Deploy to FTP

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check FTP credentials
        id: ftp
        env:
          FTP_USERNAME: ${{ secrets.FTP_USERNAME || secrets.FTP_USER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD || secrets.FTP_PASS }}
        run: |
          if [ -n "$FTP_USERNAME" ] && [ -n "$FTP_PASSWORD" ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
            echo "FTP credentials are set — deploy step will run."
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "::notice::FTP deploy skipped — no repository secrets. Add FTP_USERNAME (or FTP_USER) and FTP_PASSWORD (or FTP_PASS) under Settings → Secrets and variables → Actions. Same repo/fork that runs this workflow."
          fi

      - name: Deploy via FTP
        if: steps.ftp.outputs.ok == 'true'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: afflatusconsulting.tech
          username: ${{ secrets.FTP_USERNAME || secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD || secrets.FTP_PASS }}
          server-dir: public_html/
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            .gitignore

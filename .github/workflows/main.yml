# Deploy PHP site to Hostinger → public_html (afflatusconsulting.tech)
#
# Required — add under: Repository → Settings → Secrets and variables → Actions
#   Username: FTP_USERNAME  OR  FTP_USER
#   Password: FTP_PASSWORD  OR  FTP_PASS
#
# Hostinger: hPanel → Files → FTP Accounts → full username + password.
# Forks: secrets are NOT inherited. Org secrets: allow this repository.
#
# If secrets are missing, the workflow still succeeds but skips FTP upload
# (see “Check FTP credentials” step log).
#
# server-dir: Hostinger domain FTP often lands IN public_html. Using public_html/
# uploads to public_html/public_html/. Use ./ here unless your FTP root is above public_html.
#
# ETIMEDOUT on port 21 from GitHub Actions: Hostinger (and many hosts) block FTP from
# cloud/datacenter IPs. FileZilla from your PC still works. Fix: use workflow
# “Deploy via SSH (rsync)” (.github/workflows/deploy-rsync-ssh.yml) with SSH port 65002,
# or Hostinger hPanel Git deployment, or a self-hosted runner.
# Optional: try removing protocol: ftps below (same port 21; rarely fixes timeout).

name: Deploy to FTP

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check FTP credentials
        id: ftp
        env:
          FTP_USERNAME: ${{ secrets.FTP_USERNAME || secrets.FTP_USER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD || secrets.FTP_PASS }}
        run: |
          if [ -n "$FTP_USERNAME" ] && [ -n "$FTP_PASSWORD" ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
            echo "FTP credentials are set — deploy step will run."
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "::notice::FTP deploy skipped — no repository secrets. Add FTP_USERNAME (or FTP_USER) and FTP_PASSWORD (or FTP_PASS) under Settings → Secrets and variables → Actions."
          fi

      - name: Deploy via FTP
        if: steps.ftp.outputs.ok == 'true'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: afflatusconsulting.tech
          protocol: ftps
          username: ${{ secrets.FTP_USERNAME || secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD || secrets.FTP_PASS }}
          server-dir: ./
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            .gitignore
            router.php
            data/**
